<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>七合一游戏启动器</title>
  <link rel="stylesheet" href="launcher.css">
</head>
<body>
  <main class="launcher-shell">
    <header class="launcher-header">
      <p class="launcher-kicker">Seven Games</p>
      <h1>七合一游戏启动器</h1>
    </header>

    <section class="game-grid" aria-label="游戏列表">
      <a class="game-card card-dangguan" href="DangGuan/index.html" aria-label="开始当官">
        <span class="game-cover">
          <img src="DangGuan/assets/main/native/16/165a826da.png" alt="当官">
        </span>
        <span class="game-info">
          <span class="game-title">当官</span>
          <span class="game-action">开始游戏</span>
        </span>
      </a>

      <a class="game-card card-haiyang" href="HaiYang/index.html" aria-label="开始海洋">
        <span class="game-cover">
          <img src="HaiYang/res/raw-assets/10/1064bddc-618c-406c-8c39-9ee9ebb09ec1.801d1.png" alt="海洋">
        </span>
        <span class="game-info">
          <span class="game-title">海洋</span>
          <span class="game-action">开始游戏</span>
        </span>
      </a>

      <a class="game-card card-tangguo" href="TangGuo/index.html" aria-label="开始糖果">
        <span class="game-cover">
          <img src="TangGuo/assets/res/native/c2/c2f44f35-f11d-43fe-9b97-ed31e88ff18a.png" alt="糖果">
        </span>
        <span class="game-info">
          <span class="game-title">糖果</span>
          <span class="game-action">开始游戏</span>
        </span>
      </a>

      <a class="game-card card-tiantian" href="TianTian/index.html" aria-label="开始天天">
        <span class="game-cover">
          <img src="TianTian/assets/resources/native/1b/1b7e15bd1.png" alt="天天">
        </span>
        <span class="game-info">
          <span class="game-title">天天</span>
          <span class="game-action">开始游戏</span>
        </span>
      </a>

      <a class="game-card card-mishi" href="MiShi/index.html" aria-label="开始密室方块">
        <span class="game-cover">
          <img src="MiShi/assets/ui/native/bb/bb1916b0-e519-47f1-ae54-82a91825489c.png" alt="密室方块">
        </span>
        <span class="game-info">
          <span class="game-title">密室方块</span>
          <span class="game-action">开始游戏</span>
        </span>
      </a>

      <a class="game-card card-qiuqiu" href="QiuQiu/index.html" aria-label="开始球球">
        <span class="game-cover">
          <img src="QiuQiu/assets/main/native/88/880b5359-d8c7-42e2-96fb-da98cd4438e0.png" alt="球球">
        </span>
        <span class="game-info">
          <span class="game-title">球球</span>
          <span class="game-action">开始游戏</span>
        </span>
      </a>

      <a class="game-card card-number" href="NumberGame/index.html" aria-label="开始数字游戏">
        <span class="game-cover">
          <img src="NumberGame/icon.png" alt="数字游戏">
        </span>
        <span class="game-info">
          <span class="game-title">数字游戏</span>
          <span class="game-action">开始游戏</span>
        </span>
      </a>
    </section>
  </main>
</body>
</html>
